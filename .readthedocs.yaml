# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# ReadtheDocs config version
version: 2

# Set the ReadtheDocs Docker image OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # Download fully-rendered notebooks from Figshare before MkDocs builds the site.
    #
    # Each experiment that has been pushed writes a small JSON file into the repo at:
    #   documentation/docs/pages/experiments/<ename>/notebooks_urls.json
    # That file maps notebook stem -> Figshare download URL, for example:
    #   {
    #     "SST": "https://figshare.com/ndownloader/files/12345678",
    #     "MLD": "https://figshare.com/ndownloader/files/12345679"
    #   }
    #
    # The rendered notebooks (with cell outputs intact) are too large to store in
    # git, so they live on Figshare and are fetched here at build time.  By the
    # time MkDocs runs, each <nb>.ipynb is present in the docs tree and
    # mkdocs-jupyter can render it as a page.
    #
    # Notebooks already present on disk are skipped (idempotent).
    # Missing URLs (empty map, or key absent) are silently skipped.
    pre_build:
      - |
        echo "=== Downloading rendered notebooks from Figshare ==="
        python3 - << 'PYEOF'
        import json, sys, urllib.request
        from pathlib import Path

        docs_root = Path("documentation/docs/pages/experiments")
        if not docs_root.exists():
            print("No experiments directory found – nothing to download.")
            sys.exit(0)

        total_downloaded = 0
        total_skipped    = 0

        for urls_json in sorted(docs_root.glob("*/notebooks_urls.json")):
            ename = urls_json.parent.name
            try:
                url_map = json.loads(urls_json.read_text())
            except Exception as exc:
                print(f"[{ename}] WARNING: could not read {urls_json}: {exc}")
                continue

            if not url_map:
                print(f"[{ename}] No notebook URLs recorded yet – skipping.")
                continue

            print(f"[{ename}] Downloading {len(url_map)} notebook(s)...")
            nb_dir = urls_json.parent / "notebooks"
            nb_dir.mkdir(exist_ok=True)
            for nb_name, url in url_map.items():
                dest = nb_dir / f"{nb_name}.ipynb"
                if dest.exists():
                    print(f"  {nb_name}.ipynb already present – skipping")
                    total_skipped += 1
                    continue
                print(f"  {nb_name}.ipynb  <-  {url}")
                try:
                    urllib.request.urlretrieve(url, dest)
                    total_downloaded += 1
                except Exception as exc:
                    print(f"  ERROR downloading {nb_name}: {exc}", file=sys.stderr)

        print()
        print(f"=== Done: {total_downloaded} downloaded, {total_skipped} already present ===")
        PYEOF
  # jobs: # MODIFY: uncomment lines below to cancel the RTD build (e.g., for specific branches)
    # post_checkout:
    #   - exit 183

# Build documentation with Mkdocs
mkdocs:
  configuration: documentation/mkdocs.yml # MODIFY: path to mkdocs.yml

# Python requirements to build your documentation
# See https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
python:
  install:
    - requirements: documentation/requirements.txt # MODIFY: path to requirements.txt
